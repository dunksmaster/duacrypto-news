# Deploy a Cloudflare Pages preview for same-repo PRs (not Dependabot).
name: PR preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  preview:
    # Dependabot PRs cannot use repository secrets — skip preview (Verify build still runs).
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CSP_ENFORCE: "1"
      PREVIEW_BRANCH: pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Check Cloudflare secrets
        id: cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Cloudflare secrets not set — skipping preview deploy."
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install and build
        if: steps.cf.outputs.ok == 'true'
        run: npm ci && npm run build

      - name: Deploy preview to Cloudflare Pages
        if: steps.cf.outputs.ok == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.100.0"
          command: pages deploy dist --project-name=dc-news --branch=${{ env.PREVIEW_BRANCH }} --commit-dirty=true

      - name: Comment preview URL on PR
        if: steps.cf.outputs.ok == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const branch = `pr-${pr}`;
            const previewUrl = `https://${branch}.dc-news.pages.dev/`;
            const marker = '<!-- dc-news-preview -->';
            const body = `${marker}\n## Preview deploy\n\n**Render the draft on your phone:** [${previewUrl}](${previewUrl})\n\nBranch \`${branch}\` on Cloudflare Pages (\`dc-news\`). Updates on every push to this PR.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
