# Notify Telegram when a CI workflow fails on main.
name: CI failure alert

on:
  workflow_run:
    workflows:
      - Deploy to Cloudflare Pages
      - Verify build
      - PR preview
      - AI draft post
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  notify:
    if: >-
      github.event.workflow_run.conclusion != 'success' &&
      github.event.workflow_run.event != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Telegram alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_NAME: ${{ github.event.workflow_run.name }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set — skipping alert"
            exit 0
          fi
          TEXT="CI failed: ${RUN_NAME}%0Abranch: ${BRANCH}%0Aresult: ${CONCLUSION}%0A${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"
