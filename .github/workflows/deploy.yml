# Deploy to Cloudflare Pages (dc-news)
name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-dc-news
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CSP_ENFORCE: "1"

    steps:
      - name: Require Cloudflare Pages secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Set CLOUDFLARE_PAGES_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repo secrets."
            exit 1
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: npm ci && npm audit --audit-level=high && npm run build

      - name: Ping IndexNow
        run: node scripts/ping-indexnow.mjs
        continue-on-error: true

      # One Wrangler call for deploy (retries on Cloudflare 10429 rate limits).
      # Project already exists — do not call `pages project create` every push.
      - name: Deploy to Cloudflare Pages
        run: |
          set -e
          for i in 1 2 3 4 5; do
            echo "Deploy attempt $i..."
            if npx --yes wrangler@4.100.0 pages deploy dist --project-name=dc-news --branch=main --commit-dirty=true; then
              echo "Deploy succeeded on attempt $i"
              exit 0
            fi
            wait=$((i * 45))
            echo "Deploy failed (likely rate limit). Waiting ${wait}s before retry..."
            sleep "$wait"
          done
          echo "::error::Cloudflare Pages deploy failed after retries"
          exit 1

      - name: Apply D1 migrations
        run: |
          sleep 20
          npx --yes wrangler@4.100.0 d1 execute dc-news-analytics --remote --file=migrations/0002_rate_limits.sql || true
