# Deploy to Cloudflare Pages (dc-news)
name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-dc-news
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CSP_ENFORCE: "1"

    steps:
      - name: Require Cloudflare Pages secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Set CLOUDFLARE_PAGES_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repo secrets."
            exit 1
          fi
          code=$(curl -s -o /tmp/cf-pages.json -w "%{http_code}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/dc-news")
          if [ "$code" = "401" ] || [ "$code" = "403" ]; then
            echo "::error::CLOUDFLARE_PAGES_API_TOKEN is invalid or expired (HTTP $code)."
            echo "Create a new token: Cloudflare dashboard → My Profile → API Tokens → Custom → Account / Cloudflare Pages / Edit"
            echo "Then: gh secret set CLOUDFLARE_PAGES_API_TOKEN --repo dunksmaster/duacrypto-news"
            cat /tmp/cf-pages.json || true
            exit 1
          fi
          if [ "$code" != "200" ]; then
            echo "::warning::Preflight check returned HTTP $code (continuing to deploy)"
            cat /tmp/cf-pages.json || true
          fi

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: npm ci && npm audit --audit-level=high && npm run build

      - name: Ping IndexNow
        run: node scripts/ping-indexnow.mjs
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            echo "Deploy attempt $i..."
            log=$(mktemp)
            set +e
            npx --yes wrangler@4.100.0 pages deploy dist --project-name=dc-news --branch=main --commit-dirty=true 2>&1 | tee "$log"
            wrangler_status=$?
            set -e

            if grep -qE 'Invalid access token|Authentication error|code: 9109|code: 10000' "$log"; then
              echo "::error::Cloudflare token rejected. Regenerate CLOUDFLARE_PAGES_API_TOKEN (see deploy workflow logs)."
              exit 1
            fi

            if grep -q 'Deployment complete!' "$log"; then
              echo "Deploy succeeded on attempt $i"
              grep -o 'https://[^ ]*pages.dev' "$log" | tail -1 || true
              exit 0
            fi

            if grep -qE 'malformed response from the API|Received a malformed response' "$log"; then
              echo "::warning::Cloudflare API returned a malformed/HTML response on attempt $i (wrangler exit $wrangler_status)."
            else
              echo "::warning::Deploy attempt $i did not report 'Deployment complete!' (wrangler exit $wrangler_status)."
            fi

            if [ "$i" -eq 3 ]; then
              echo "::error::Cloudflare Pages deploy failed after 3 attempts — no 'Deployment complete!' in wrangler output."
              exit 1
            fi
            wait=$((i * 60))
            echo "Retrying in ${wait}s..."
            sleep "$wait"
          done

      - name: Verify production HTML updated
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5 6; do
            html=$(curl -fsSL "https://news.duacrypto.com/")
            if echo "$html" | grep -q 'site-header__shell'; then
              echo "Production homepage includes mobile nav fix markup."
              exit 0
            fi
            echo "Waiting for news.duacrypto.com to serve latest deploy (attempt $i)..."
            sleep 20
          done
          echo "::error::Production still serves old header HTML after deploy. Purge Cloudflare cache or check custom domain binding for dc-news."
          exit 1

      - name: Apply D1 migrations
        run: |
          sleep 15
          npx --yes wrangler@4.100.0 d1 execute dc-news-analytics --remote --file=migrations/0002_rate_limits.sql || true
