# Build + validate on pull requests (no deploy).
name: Verify build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: verify-news-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CSP_ENFORCE: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: Validate posts
        run: npm run validate:posts

      - name: Build
        run: npm run build
