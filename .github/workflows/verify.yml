# Build + validate on pull requests (no deploy).
name: Verify build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: verify-news-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CSP_ENFORCE: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: Validate posts
        run: npm run validate:posts

      - name: Build
        run: npm run build
