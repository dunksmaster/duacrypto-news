name: Telegram post on publish

on:
  push:
    branches: [main]
    paths:
      - "src/content/posts/**"

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new posts
        id: posts
        run: |
          NEW=$(git diff --name-only HEAD~1 HEAD -- 'src/content/posts/*.md' | grep -v '\-sq\.md$' || true)
          if [ -z "$NEW" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          FILE=$(echo "$NEW" | head -1)
          TITLE=$(grep '^title:' "$FILE" | head -1 | sed 's/^title: *"\?\(.*\)"\?/\1/')
          SLUG=$(basename "$FILE" .md)
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "url=https://news.duacrypto.com/posts/$SLUG/" >> "$GITHUB_OUTPUT"

      - name: Post to Telegram
        if: steps.posts.outputs.skip != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set — skipping"
            exit 0
          fi
          TEXT="New on DuaCrypto News: ${{ steps.posts.outputs.title }}%0A${{ steps.posts.outputs.url }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=false"
