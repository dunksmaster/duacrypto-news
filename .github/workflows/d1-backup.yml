# Weekly D1 backup (requires remote DB + wrangler auth in CI secrets).
name: D1 weekly backup

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install wrangler
        run: npm ci

      - name: Export D1 database
        run: npx wrangler d1 export dc-news-analytics --remote --output=dc-news-analytics.sql
        continue-on-error: true

      - name: Upload backup artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: d1-dc-news-analytics-${{ github.run_id }}
          path: dc-news-analytics.sql
          retention-days: 90
        if: hashFiles('dc-news-analytics.sql') != ''
