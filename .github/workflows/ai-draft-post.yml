name: AI draft post

on:
  schedule:
    - cron: "0 8 * * 1,3,5"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate draft post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-post.mjs --queue

      - name: Validate posts
        run: npm run validate:posts

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai/draft-post
          delete-branch: true
          commit-message: "AI draft: new post"
          title: "AI draft: new post"
          body: |
            Automated draft from the AI post generator.

            - Review frontmatter and body
            - Set `draft: false` before merge to publish
            - Merge to deploy to news.duacrypto.com
