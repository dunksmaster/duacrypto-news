name: AI draft post

on:
  schedule:
    - cron: "0 8 * * 1,3,5"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Check Anthropic secret
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "::warning::ANTHROPIC_API_KEY not set — skipping AI draft. Run: gh secret set ANTHROPIC_API_KEY -R dunksmaster/duacrypto-news"
            exit 0
          fi

      - name: Install dependencies
        if: secrets.ANTHROPIC_API_KEY != ''
        run: npm ci

      - name: Generate draft post
        if: secrets.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-post.mjs --queue

      - name: Validate posts
        if: secrets.ANTHROPIC_API_KEY != ''
        run: npm run validate:posts

      - name: Create pull request
        if: secrets.ANTHROPIC_API_KEY != ''
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai/draft-post
          delete-branch: true
          commit-message: "AI draft: new post"
          title: "AI draft: new post"
          body: |
            Automated draft from the AI post generator.

            **Review checklist**
            - Read the markdown diff
            - Open the **PR preview URL** (posted by the Preview workflow) on your phone
            - Set `draft: false` before merge to publish
            - Merge to deploy to news.duacrypto.com
