name: AI draft post

on:
  schedule:
    - cron: "0 8 * * 1,3,5"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate draft post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-post.mjs --queue

      - name: Validate posts
        run: npm run validate:posts

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai/draft-post
          delete-branch: true
          commit-message: "AI draft: new post"
          title: "AI draft: new post"
          body: |
            Automated draft from the AI post generator.

            **Review checklist**
            - Read the markdown diff
            - Open the **PR preview URL** (posted by the Preview workflow) on your phone
            - Set `draft: false` before merge to publish
            - Merge to deploy to news.duacrypto.com
